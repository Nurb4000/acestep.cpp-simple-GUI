<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/static/script.js"></script>
<style>
    /* Base styles */
    :root {
        --text-primary: #ffffff;
        --text-secondary: #e2e8f0;
        --bg-primary: #1a202c;
        --bg-secondary: #2d3748;
        --bg-input: #2d3748;
        --border-color: #4a5568;
        --focus-ring: #4299e1;
        --placeholder-color: #a0aec0;
    }

    body {
        @apply bg-gray-900;
        color: var(--text-primary);
    }

    /* Ensure all text is white and visible */
    input, textarea, select {
        color: var(--text-primary) !important;
    }

    /* Input and textarea base styles */
    .text-input, 
    .number-input, 
    .textarea {
        @apply w-full px-3 py-2 rounded-md border focus:outline-none focus:ring-2 focus:ring-blue-500;
        background-color: var(--bg-input);
        border-color: var(--border-color);
        color: var(--text-primary) !important;
    }

    /* Text inputs */
    .text-input {
        @apply bg-gray-800;
    }

    /* Number inputs */
    .number-input {
        @apply bg-gray-800;
    }

    /* Textareas */
    .textarea {
        @apply bg-gray-800;
        min-height: 8rem; /* Default height for textareas */
    }

    /* Make caption, lyrics, and negative prompt taller */
    #caption.textarea,
    #lyrics.textarea,
    #lm_negative_prompt.textarea {
        min-height: 10rem;
    }

    /* Placeholder text */
    ::placeholder { /* Chrome, Firefox, Opera, Safari 10.1+ */
        color: var(--placeholder-color) !important;
        opacity: 1; /* Firefox */
    }

    :-ms-input-placeholder { /* Internet Explorer 10-11 */
        color: var(--placeholder-color) !important;
    }

    ::-ms-input-placeholder { /* Microsoft Edge */
        color: var(--placeholder-color) !important;
    }

    /* Buttons */
    .btn {
        @apply px-4 py-2 rounded-md font-medium transition-colors duration-200;
    }

    .btn-primary {
        @apply bg-blue-600 text-white hover:bg-blue-700;
    }

    .btn-secondary {
        @apply bg-gray-700 text-white hover:bg-gray-600;
    }

    /* Error message */
    .error-message {
        @apply text-red-400 text-sm mt-1;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }

    ::-webkit-scrollbar-track {
        @apply bg-gray-800;
    }

    ::-webkit-scrollbar-thumb {
        @apply bg-gray-600 rounded;
    }

    ::-webkit-scrollbar-thumb:hover {
        @apply bg-gray-500;
    }

    /* Force text color in all inputs */
    input[type="text"], 
    input[type="number"], 
    input[type="email"], 
    input[type="password"], 
    input[type="search"], 
    input[type="tel"], 
    input[type="url"], 
    textarea, 
    select {
        color: var(--text-primary) !important;
    }

    /* Override any browser-specific styles */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
        -webkit-text-fill-color: var(--text-primary) !important;
        -webkit-box-shadow: 0 0 0 30px var(--bg-input) inset !important;
    }
</style>
</head>
<body class="h-full text-white">
    <div class="min-h-full flex flex-col">
        <header class="bg-gray-800 shadow">
            <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
                <h1 class="text-3xl font-bold">Music Gen</h1>
            </div>
        </header>
        
        <main class="flex-1 overflow-y-auto p-6">
           <form id="musicForm" class="max-w-7xl mx-auto space-y-6">
    <!-- Top Row: Caption (wider) and Duration -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <!-- Caption with LLM checkbox - spans 3 columns -->
        <div class="space-y-2 lg:col-span-3">
            <div class="flex items-center justify-between">
                <label class="block text-sm font-medium text-white">Caption</label>
                <div class="flex items-center space-x-2">
                    <label class="text-sm text-white">With LLM</label>
                    <input type="checkbox" id="use_llm" name="use_llm" class="rounded text-blue-600">
                </div>
            </div>
            <textarea 
                id="caption" 
                name="caption" 
                class="textarea w-full bg-gray-800 text-white" 
                placeholder="Enter caption...">{{ defaults.caption }}</textarea>
        </div>

        <!-- Duration - 1 column -->
        <div class="space-y-2">
            <label class="block text-sm font-medium text-white">Duration</label>
            <input 
                type="number" 
                id="duration" 
                name="duration" 
                step="0.1" 
                class="number-input w-full bg-gray-800 text-white" 
                value="{{ defaults.duration }}">
        </div>
    </div>

    <!-- Lyrics - full width -->
    <div class="space-y-2">
        <label class="block text-sm font-medium text-white">Lyrics</label>
        <textarea 
            id="lyrics" 
            name="lyrics" 
            class="textarea w-full bg-gray-800 text-white" 
            placeholder="Enter lyrics...">{{ defaults.lyrics }}</textarea>
    </div>

    <!-- Negative Prompt - full width -->
    <div class="space-y-2">
        <label class="block text-sm font-medium text-white">Negative Prompt</label>
        <textarea 
            id="lm_negative_prompt" 
            name="lm_negative_prompt" 
            class="textarea w-full bg-gray-800 text-white" 
            placeholder="Enter negative prompt...">{{ defaults.lm_negative_prompt }}</textarea>
    </div>

    <!-- Grid Layout for Other Fields -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <!-- Column 1 -->
        <div class="space-y-4">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">BPM</label>
                <input 
                    type="number" 
                    id="bpm" 
                    name="bpm" 
                    class="number-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.bpm }}">
            </div>
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">Vocal Language</label>
                <input 
                    type="text" 
                    id="vocal_language" 
                    name="vocal_language" 
                    class="text-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.vocal_language }}">
            </div>
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">LM CFG Scale</label>
                <input 
                    type="number" 
                    id="lm_cfg_scale" 
                    name="lm_cfg_scale" 
                    step="0.1" 
                    class="number-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.lm_cfg_scale }}">
            </div>
        </div>

        <!-- Column 2 -->
        <div class="space-y-4">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">Keyscale</label>
                <input 
                    type="text" 
                    id="keyscale" 
                    name="keyscale" 
                    class="text-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.keyscale }}">
            </div>
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">Seed</label>
                <input 
                    type="number" 
                    id="seed" 
                    name="seed" 
                    class="number-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.seed }}">
            </div>
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">LM Top P</label>
                <input 
                    type="number" 
                    id="lm_top_p" 
                    name="lm_top_p" 
                    step="0.01" 
                    class="number-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.lm_top_p }}">
            </div>
        </div>

        <!-- Column 3 -->
        <div class="space-y-4">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">Time Signature</label>
                <input 
                    type="text" 
                    id="timesignature" 
                    name="timesignature" 
                    class="text-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.timesignature }}">
            </div>
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">LM Temperature</label>
                <input 
                    type="number" 
                    id="lm_temperature" 
                    name="lm_temperature" 
                    step="0.01" 
                    class="number-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.lm_temperature }}">
            </div>
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">LM Top K</label>
                <input 
                    type="number" 
                    id="lm_top_k" 
                    name="lm_top_k" 
                    class="number-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.lm_top_k }}">
            </div>
        </div>

        <!-- Column 4 -->
        <div class="space-y-4">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">Audio Codes</label>
                <input 
                    type="text" 
                    id="audio_codes" 
                    name="audio_codes" 
                    class="text-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.audio_codes }}">
            </div>
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">Inference Steps</label>
                <input 
                    type="number" 
                    id="inference_steps" 
                    name="inference_steps" 
                    class="number-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.inference_steps }}">
            </div>
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-white">Guidance Scale</label>
                <input 
                    type="number" 
                    id="guidance_scale" 
                    name="guidance_scale" 
                    step="0.1" 
                    class="number-input w-full bg-gray-800 text-white" 
                    value="{{ defaults.guidance_scale }}">
            </div>
        </div>
    </div>

    <!-- Bottom Row: Shift and Audio Cover Strength -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-2">
            <label class="block text-sm font-medium text-white">Shift</label>
            <input 
                type="number" 
                id="shift" 
                name="shift" 
                step="0.1" 
                class="number-input w-full bg-gray-800 text-white" 
                value="{{ defaults.shift }}">
        </div>
        
        <div class="space-y-2">
            <label class="block text-sm font-medium text-white">Audio Cover Strength</label>
            <input 
                type="number" 
                id="audio_cover_strength" 
                name="audio_cover_strength" 
                step="0.01" 
                class="number-input w-full bg-gray-800 text-white" 
                value="{{ defaults.audio_cover_strength }}">
        </div>
    </div>

    <div class="pt-4">
        <button 
            type="submit" 
            id="generateBtn" 
            class="btn btn-primary w-full text-white bg-blue-600 hover:bg-blue-700">
            Generate Music
        </button>
    </div>
</form>

            <!-- Results Section -->
            <div id="results" class="max-w-4xl mx-auto mt-8 hidden">
                <h2 class="text-xl font-semibold mb-4">Generated Music</h2>
                <div class="bg-gray-800 p-4 rounded-lg">
                    <div id="audioPlayer" class="mb-4"></div>
                    <div class="flex space-x-4">
                        <button id="downloadBtn" class="btn btn-primary">Download All Files</button>
                        <button id="newGenerationBtn" class="btn btn-secondary">New Generation</button>
                    </div>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="max-w-4xl mx-auto mt-8 hidden text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
                <p class="mt-2">Generating music, please wait...</p>
            </div>

            <!-- Error Message -->
            <div id="error" class="max-w-4xl mx-auto mt-8 p-4 bg-red-900 text-white rounded-lg hidden"></div>
        </main>

        <footer class="bg-gray-800 py-4">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-sm">courtesy IDS, 2026</p>
            </div>
        </footer>
    </div>
</body>
</html>
