<script>  
    $(document).ready(function() {  
        let currentBaseFilename = '';  
        let currentUseLLM = false;  
        let currentUseRefAudio = false;  
        let enhancedData = null;  
        let originalFormData = {};  
        
        // Store original form data on page load  
        $(window).on('load', function() {  
            originalFormData = getFormData();  
        });  
        
        // Get current form data  
        function getFormData() {  
            const formData = {};  
            $('#musicForm :input').each(function() {  
                const name = $(this).attr('name');  
                if (name) {  
                    formData[name] = $(this).val();  
                }  
            });  
            return formData;  
        }  
        
        // Reset to defaults  
        $('#resetToDefaultsBtn').on('click', function() {  
            console.log("Reset to defaults clicked");  
            // Get default values from the template  
            const defaults = {{ defaults|tojson }};  
            // Reset all form fields to defaults  
            for (const [key, value] of Object.entries(defaults)) {  
                if (key === 'caption' || key === 'lyrics' || key === 'lm_negative_prompt') {  
                    $`#${key}`).val(value);  
                } else {  
                    $`#${key}`).val(value);  
                }  
            }  
            // Reset checkbox  
            $('#use_reference_audio').prop('checked', false);  
            // Clear enhanced data  
            enhancedData = null;  
            // Show success message  
            showSuccess("Form reset to defaults");  
        });  
        
        // Handle enhance via LLM button click  
        $('#enhanceBtn').on('click', function() {  
            console.log("Enhance button clicked");  
            // Update loading text to be more accurate  
            $('#loading-text').text('Processing enhancement...');  
            // Get form data and send to server for enhancement  
            const formData = new FormData($('#musicForm')[0]);  
            formData.set('enhance_via_llm', 'true');  
            formData.set('use_reference_audio', $('#use_reference_audio').is(':checked') ? 'true' : 'false');  
            // Remove any existing error messages  
            $('#error').addClass('hidden').html('');  
            $('#loading').removeClass('hidden');  
            $(this).prop('disabled', true);  
            $.ajax({  
                url: '/generate',  
                type: 'POST',  
                data: formData,  
                processData: false,  
                contentType: false,  
                success: function(response) {  
                    console.log("Server response:", response);  
                    if (response.status === 'enhanced') {  
                        // Handle LLM enhancement result  
                        enhancedData = response.enhanced_data;  
                        currentBaseFilename = response.base_filename;  
                        currentUseLLM = response.use_llm || false;  
                        currentUseRefAudio = response.use_reference_audio || false;  
                        // Update form fields with enhanced data  
                        $('#caption').val(enhancedData.caption || '');  
                        $('#lyrics').val(enhancedData.lyrics || '[instrumental]');  
                        $('#duration').val(enhancedData.duration || 0);  
                        $('#lm_negative_prompt').val(enhancedData.lm_negative_prompt || '');  
                        $('#bpm').val(enhancedData.bpm || 0);  
                        $('#keyscale').val(enhancedData.keyscale || '');  
                        $('#timesignature').val(enhancedData.timesignature || '');  
                        $('#vocal_language').val(enhancedData.vocal_language || 'en');  
                        $('#seed').val(enhancedData.seed || -1);  
                        $('#lm_temperature').val(enhancedData.lm_temperature || 0.85);  
                        $('#lm_cfg_scale').val(enhancedData.lm_cfg_scale || 2.0);  
                        $('#lm_top_p').val(enhancedData.lm_top_p || 0.9);  
                        $('#lm_top_k').val(enhancedData.lm_top_k || 0);  
                        $('#audio_codes').val(enhancedData.audio_codes || '');  
                        $('#inference_steps').val(enhancedData.inference_steps || 8);  
                        $('#guidance_scale').val(enhancedData.guidance_scale || 0.0);  
                        $('#shift').val(enhancedData.shift || 3.0);  
                        $('#audio_cover_strength').val(enhancedData.audio_cover_strength || 0.5);  
                        // Update original form data to current state  
                        originalFormData = getFormData();  
                        // Show success message  
                        showSuccess("LLM enhancement completed successfully");  
                    } else if (response.status === 'success') {  
                        // Handle regular generation result - FIXED: This was the bug!  
                        currentBaseFilename = response.base_filename;  
                        currentUseLLM = response.use_llm || false;  
                        currentUseRefAudio = response.use_reference_audio || false;  
                        // Create audio player using HTML5  
                        const audioPlayer = `<audio controls class="w-full">                                   <source src="${response.wav_url}" type="audio/wav">                                   Your browser does not support the audio element.                               </audio>`;  
                        $('#audioPlayer').html(audioPlayer);  
                        $('#downloadBtn').off('click').on('click', function() {  
                            const params = new URLSearchParams();  
                            params.append('use_llm', currentUseLLM);  
                            params.append('use_reference_audio', currentUseRefAudio);  
                            window.location.href = `${response.download_url}?${params.toString()}`;  
                        });  
                        $('#results').removeClass('hidden');  
                    } else {  
                        showError(response.message || 'An error occurred during generation.');  
                    }  
                },  
                error: function(xhr, status, error) {  
                    let errorMsg = 'An error occurred while communicating with the server.';  
                    if (xhr.responseJSON && xhr.responseJSON.message) {  
                        errorMsg = xhr.responseJSON.message;  
                        if (xhr.responseJSON.details) {  
                            errorMsg += `<br><small>${xhr.responseJSON.details}</small>`;  
                        }  
                    } else if (xhr.responseText) {  
                        try {  
                            const errorResponse = JSON.parse(xhr.responseText);  
                            errorMsg = errorResponse.message || errorMsg;  
                            if (errorResponse.details) {  
                                errorMsg += `<br><small>${errorResponse.details}</small>`;  
                            }  
                        } catch (e) {  
                            errorMsg += `<br><small>${xhr.responseText}</small>`;  
                        }  
                    }  
                    showError(errorMsg);  
                    console.error('Error details:', xhr.responseText);  
                },  
                complete: function() {  
                    $('#loading').addClass('hidden');  
                    $('#enhanceBtn').prop('disabled', false);  
                }  
            });  
        });  
        
        // Handle form submission (Generate Music button)  
        $('#musicForm').on('submit', function(e) {  
            e.preventDefault();  
            console.log("Form submitted");  
            // Clean up previous files before new generation  
            cleanupPreviousFiles();  
            $('#results').addClass('hidden');  
            $('#error').addClass('hidden').html('');  
            $('#loading').removeClass('hidden');  
            
            // Update loading text based on whether we're using LLM or not  
            const useLLM = $('#use_llm').is(':checked') || false;  
            if (useLLM) {  
                $('#loading-text').text('Generating music with LLM...');  
            } else {  
                $('#loading-text').text('Generating music...');  
            }  
            
            $('#generateBtn').prop('disabled', true);  
            const formData = new FormData(this);  
            const useRefAudio = $('#use_reference_audio').is(':checked');  
            // Explicitly set flags  
            formData.set('enhance_via_llm', 'false');  
            formData.set('use_reference_audio', useRefAudio ? 'true' : 'false');  
            // Ensure caption is always included (even if empty)  
            const caption = $('#caption').val();  
            formData.set('caption', caption);  
            // Append file only if reference audio is selected AND a file exists  
            const fileInput = document.getElementById('reference_audio');  
            if (useRefAudio && fileInput.files.length > 0) {  
                const file = fileInput.files[0];  
                formData.append('reference_audio', file);  
                console.log("Appended reference audio to form:", file.name);  
            } else if (useRefAudio && fileInput.files.length === 0) {  
                showError("Reference audio is selected but no file was chosen.");  
                $('#loading').addClass('hidden');  
                $('#generateBtn').prop('disabled', false);  
                return;  
            }  
            // Log what's being sent  
            console.log("Sending form data:");  
            for (let [key, value] of formData.entries()) {  
                console.log`${key}:`, value);  
            }  
            $.ajax({  
                url: '/generate',  
                type: 'POST',  
                data: formData,  
                processData: false,  
                contentType: false,  
                success: function(response) {  
                    console.log("Server response:", response);  
                    if (response.status === 'success') {  
                        // Handle regular generation result  
                        currentBaseFilename = response.base_filename;  
                        currentUseLLM = response.use_llm || false;  
                        currentUseRefAudio = response.use_reference_audio || false;  
                        // Create audio player using HTML5  
                        const audioPlayer = `<audio controls class="w-full">                                   <source src="${response.wav_url}" type="audio/wav">                                   Your browser does not support the audio element.                               </audio>`;  
                        $('#audioPlayer').html(audioPlayer);  
                        $('#downloadBtn').off('click').on('click', function() {  
                            const params = new URLSearchParams();  
                            params.append('use_llm', currentUseLLM);  
                            params.append('use_reference_audio', currentUseRefAudio);  
                            window.location.href = `${response.download_url}?${params.toString()}`;  
                        });  
                        $('#results').removeClass('hidden');  
                    } else {  
                        showError(response.message || 'An error occurred during generation.');  
                    }  
                },  
                error: function(xhr, status, error) {  
                    let errorMsg = 'An error occurred while communicating with the server.';  
                    if (xhr.responseJSON && xhr.responseJSON.message) {  
                        errorMsg = xhr.responseJSON.message;  
                        if (xhr.responseJSON.details) {  
                            errorMsg += `<br><small>${xhr.responseJSON.details}</small>`;  
                        }  
                    } else if (xhr.responseText) {  
                        try {  
                            const errorResponse = JSON.parse(xhr.responseText);  
                            errorMsg = errorResponse.message || errorMsg;  
                            if (errorResponse.details) {  
                                errorMsg += `<br><small>${errorResponse.details}</small>`;  
                            }  
                        } catch (e) {  
                            errorMsg += `<br><small>${xhr.responseText}</small>`;  
                        }  
                    }  
                    showError(errorMsg);  
                    console.error('Error details:', xhr.responseText);  
                },  
                complete: function() {  
                    $('#loading').addClass('hidden');  
                    $('#generateBtn').prop('disabled', false);  
                }  
            });  
        });  
        
        $('#newGenerationBtn').on('click', function() {  
            // Clean up previous files  
            cleanupPreviousFiles();  
            $('#results').addClass('hidden');  
            $('#musicForm')[0].reset();  
            enhancedData = null;  
            currentBaseFilename = '';  
            currentUseLLM = false;  
            currentUseRefAudio = false;  
        });  
        
        function showError(message) {  
            const errorDiv = $('#error');  
            errorDiv.html(message).removeClass('hidden');  
            $('html, body').animate({  
                scrollTop: errorDiv.offset().top - 100  
            }, 500);  
        }  
        
        function showSuccess(message) {  
            const successDiv = $('#error');  
            successDiv.html(message).removeClass('bg-[#dc3545]').addClass('bg-green-600').removeClass('hidden');  
            $('html, body').animate({  
                scrollTop: successDiv.offset().top - 100  
            }, 500);  
            // Auto-hide success message after 3 seconds  
            setTimeout(() => {  
                successDiv.addClass('hidden');  
            }, 3000);  
        }  
        
        function cleanupPreviousFiles() {  
            // This is a client-side placeholder - actual cleanup would happen on server  
            console.log("Cleaning up previous files...");  
        }  
    });  
</script>
